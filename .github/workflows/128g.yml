name: Build ImmortalWRT Manual (Universal)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # 1️⃣ 获取源码
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt update -y
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev \
          libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget

    - name: Clone ImmortalWRT
      run: |
        git clone -b master https://github.com/immortalwrt/immortalwrt.git openwrt

    - name: Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # 2️⃣ 修复 default-settings 报错
    - name: Remove default-settings
      run: |
        cd openwrt
        rm -rf package/lean/default-settings

    # 3️⃣ 执行 diy-part1.sh（网络 + IPv6）
    - name: Apply diy-part1.sh
      run: bash ./diy-part1.sh

    # 4️⃣ 加载自定义 .config（已包含中文 + IPv6 全协议）
    - name: Load .config
      run: |
        cp .config openwrt/.config
        cd openwrt
        make defconfig

    # 5️⃣ 执行 diy-part2.sh（WiFi 优化 / 系统优化）
    - name: Apply diy-part2.sh
      run: bash ./diy-part2.sh

    # 6️⃣ 清理旧文件
    - name: Clean
      run: |
        cd openwrt
        make clean
        rm -rf tmp

    # 7️⃣ 下载依赖
    - name: Download Dependencies
      run: |
        cd openwrt
        make download -j8 || make download -j1

    # 8️⃣ 编译固件
    - name: Compile Firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    # 9️⃣ 上传固件
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWRT_Manual
        path: openwrt/bin/targets/
